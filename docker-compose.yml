services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shotbreakdown
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shotbreakdown}
      POSTGRES_DB: shotbreakdown
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shotbreakdown"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://shotbreakdown:${POSTGRES_PASSWORD:-shotbreakdown}@postgres:5432/shotbreakdown
      DEMO_MODE: ${DEMO_MODE:-false}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      ALLOWED_EMAIL_DOMAIN: ${ALLOWED_EMAIL_DOMAIN:-}
      STORAGE_DIR: /app/storage
      UPLOAD_DIR: /app/uploads
      MAX_CONCURRENT_JOBS: ${MAX_CONCURRENT_JOBS:-2}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      GEMINI_REQUEST_INTERVAL: ${GEMINI_REQUEST_INTERVAL:-5}
      GEMINI_MAX_RETRIES: ${GEMINI_MAX_RETRIES:-3}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ENABLE_ADAPTIVE_DETECTOR: ${ENABLE_ADAPTIVE_DETECTOR:-true}
      MIN_SCENE_LEN_FRAMES: ${MIN_SCENE_LEN_FRAMES:-12}
      ADAPTIVE_THRESHOLD: ${ADAPTIVE_THRESHOLD:-3.0}
      DELETE_VIDEO_AFTER_PROCESSING: ${DELETE_VIDEO_AFTER_PROCESSING:-false}
    volumes:
      - storage:/app/storage
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_DEMO_MODE은 빌드 타임에 JS 번들에 박힘
        NEXT_PUBLIC_DEMO_MODE: ${DEMO_MODE:-false}
    environment:
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-demo-secret-change-me}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      ALLOWED_EMAIL_DOMAIN: ${ALLOWED_EMAIL_DOMAIN:-}
      # Next.js rewrite 가 사용 (서버사이드 프록시)
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"
    restart: unless-stopped

  # 데모 모드: 별도 OAuth/도메인 없이 외부에서 접근 가능한 URL 생성
  # docker compose --profile demo up 으로 활성화. 로그에 trycloudflare.com URL 출력됨.
  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://frontend:3000
    depends_on:
      - frontend
    restart: unless-stopped
    profiles:
      - demo

volumes:
  pgdata:
  storage:
  uploads:
